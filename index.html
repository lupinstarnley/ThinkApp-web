<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThinkApp - Lupper Edition (Test Version)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>

    <style>
        /* ==========================================
           🎨 GLOBAL NEON-DARK THEME (MOBILE FIRST)
           ========================================== */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: #0B141A; color: #E9EDEF; overflow-x: hidden; }
        
        /* Utility Classes */
        .hidden { display: none !important; }
        .btn-neon { background: #00A884; color: #fff; border: none; padding: 12px 24px; border-radius: 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0, 168, 132, 0.4); }
        .btn-neon:hover { background: #029071; }
        
        /* ==========================================
           🌐 1. LANDING PAGE (WEB VIEW)
           ========================================== */
        #landing-page { text-align: center; padding: 50px 20px; background: linear-gradient(180deg, #0B141A 0%, #128C7E 100%); min-height: 100vh; }
        .hero-logo { font-size: 80px; color: #00A884; text-shadow: 0 0 20px #00A884; margin-bottom: 10px; }
        .hero-title { font-size: 32px; margin: 10px 0; }
        .hero-subtitle { font-size: 16px; color: #B1D9D4; margin-bottom: 40px; line-height: 1.5; }
        .features-list { text-align: left; max-width: 400px; margin: 0 auto 40px auto; color: #E9EDEF; }
        .features-list li { margin-bottom: 15px; list-style: none; }
        .features-list i { color: #00A884; margin-right: 10px; }

        /* ==========================================
           🔐 2. AUTHENTICATION PAGE (APP VIEW)
           ========================================== */
        #auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-box { background: #111B21; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 20px; width: 100%; }
        .input-group input { width: 100%; padding: 15px; background: #2A3942; border: 1px solid #00A884; color: #fff; border-radius: 8px; outline: none; }
        #pin-container { display: none; } 

        /* ==========================================
           💬 3. MAIN APP INTERFACE (WHATSAPP CLONE)
           ========================================== */
        #main-app { display: flex; flex-direction: column; height: 100vh; }
        .top-bar { background-color: #128C7E; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 10; }
        .top-bar h2 { margin: 0; font-size: 20px; }
        .top-icons i { margin-left: 20px; font-size: 18px; cursor: pointer; }
        .top-icons i:hover { color: #000; }
        
        .tabs { display: flex; background-color: #128C7E; text-align: center; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .tab { flex: 1; padding: 12px; color: #B1D9D4; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom: 3px solid white; }

        .chat-list { flex: 1; overflow-y: auto; background: #0B141A; }
        .chat-item { display: flex; padding: 15px; border-bottom: 1px solid #202C33; align-items: center; cursor: pointer; }
        .chat-item:hover { background: #202C33; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #00A884; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 15px; }
        .chat-details { flex: 1; }
        .chat-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; display: flex; justify-content: space-between;}
        .chat-last-msg { color: #8696A0; font-size: 14px; }
        .blue-tick { color: #53bdeb; margin-left: 5px; font-size: 14px; }

        .fab { position: fixed; bottom: 20px; right: 20px; background-color: #00A884; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); font-size: 24px; cursor: pointer; z-index: 100; }

        /* ==========================================
           👑 4. THE LEGENDARY ADMIN DASHBOARD
           ========================================== */
        #admin-panel { background: #000; min-height: 100vh; padding: 20px; border: 2px solid #D4AF37; }
        .admin-header { color: #D4AF37; text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        .admin-card { background: #111; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #D4AF37; }
        .verify-btn { background: transparent; border: 1px solid #53bdeb; color: #53bdeb; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .verify-btn:hover { background: #53bdeb; color: #000; }
        .delete-btn { background: transparent; border: 1px solid #f15c6d; color: #f15c6d; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

    </style>
</head>
<body>

    <div id="landing-page">
        <div class="hero-logo"><i class="fa-brands fa-whatsapp"></i></div>
        <h1 class="hero-title">ThinkApp</h1>
        <p class="hero-subtitle">The Ultimate Private Communication Ecosystem.<br>End-to-End Encrypted. Luileys Cloud Powered.</p>
        
        <button class="btn-neon" onclick="simulateDownload()">Enter Web App</button>
        <p style="margin-top: 20px; color: #8696A0; font-size: 12px;">GitHub Testing Environment</p>
    </div>

    <div id="auth-page" class="hidden">
        <div class="auth-box">
            <h2 style="text-align: center; color: #00A884; margin-bottom: 20px;">Welcome to ThinkApp</h2>
            
            <div class="input-group">
                <input type="email" id="userEmail" placeholder="Email Address" oninput="checkMasterEmail()">
            </div>
            
            <div class="input-group">
                <input type="text" id="userPhone" placeholder="Phone Number (e.g. +255...)">
            </div>

            <div class="input-group" id="pin-container">
                <input type="password" id="masterPin" placeholder="MASTER PIN">
            </div>

            <button class="btn-neon" style="width: 100%;" onclick="authenticateUser()">Agree and Continue</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div class="top-bar">
            <h2>ThinkApp</h2>
            <div class="top-icons">
                <i class="fa-solid fa-camera"></i>
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-ellipsis-vertical" onclick="alert('3-Dots Menu: Mipangilio')"></i>
                <i class="fa-solid fa-right-from-bracket" style="color: #f15c6d;" onclick="signOutApp()" title="Sign Out"></i>
            </div>
        </div>

        <div class="tabs">
            <div class="tab" style="flex: 0.2;"><i class="fa-solid fa-users"></i></div>
            <div class="tab active">Chats</div>
            <div class="tab">Status</div>
            <div class="tab">Calls</div>
        </div>

        <div class="chat-list" id="chatListContainer">
            </div>

        <div class="fab">
            <i class="fa-solid fa-message"></i>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <h1 class="admin-header"><i class="fa-solid fa-crown"></i> The God-Eye Dashboard</h1>
        
        <div class="admin-card">
            <h3><i class="fa-solid fa-robot"></i> System Status</h3>
            <p style="color: #8696A0; font-size: 14px;">Welcome Boss. All systems connected via GitHub Pages.</p>
        </div>

        <button class="btn-neon" style="width: 100%; margin-top: 20px;" onclick="switchPage('main-app')">Enter Standard App View</button>
        <button class="btn-neon" style="width: 100%; margin-top: 20px; background: #f15c6d;" onclick="signOutApp()">Sign Out System</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        const firebaseConfig = {
            apiKey: "AIzaSyD8qDCwpuEg0-Dz_9X3OS5BbZcLldSOL58",
            authDomain: "bet-time-6a8b2.firebaseapp.com",
            databaseURL: "https://bet-time-6a8b2-default-rtdb.firebaseio.com",
            projectId: "bet-time-6a8b2",
            storageBucket: "bet-time-6a8b2.firebasestorage.app",
            messagingSenderId: "542692701973",
            appId: "1:542692701973:web:3657ddf67aeade45059b1c",
            measurementId: "G-00PDWXJ3KM"
        };
        initializeApp(firebaseConfig);
        console.log("🔥 Firebase Connected!");
    </script>

    <script>
        /* ==========================================
         * 🔧 1. REAL APIs & CREDENTIALS
         * ========================================== */
        const MASTER_EMAIL = "lupinstarnley006@gmail.com";
        const MASTER_PIN = "2892"; 

        const ZEGO_API = { 
            appID: 1882948341, 
            serverSecret: "1cad20d53b1a1109576d27688ba447dc" 
        };
        const GEMINI_KEY = "AIzaSyAd1HLXbZxdc2EIGuUGN4NhPY16r7bb7z4";

        /* ==========================================
         * 🔄 2. ROUTING & SIGN OUT
         * ========================================== */
        function switchPage(pageId) {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }

        function simulateDownload() {
            switchPage('auth-page');
        }

        function signOutApp() {
            const confirmOut = confirm("Are you sure you want to log out of ThinkApp?");
            if(confirmOut) {
                // Futa data za fomu
                document.getElementById('userEmail').value = "";
                document.getElementById('userPhone').value = "";
                document.getElementById('masterPin').value = "";
                document.getElementById('pin-container').style.display = 'none';
                document.getElementById('userPhone').disabled = false;
                
                alert("Signed out successfully.");
                switchPage('auth-page');
            }
        }

        /* ==========================================
         * 🔐 3. AUTHENTICATION & MASTER DETECTION
         * ========================================== */
        function checkMasterEmail() {
            const email = document.getElementById('userEmail').value;
            const phoneInput = document.getElementById('userPhone');
            const pinContainer = document.getElementById('pin-container');

            if(email === MASTER_EMAIL) {
                phoneInput.value = "The Boss Account";
                phoneInput.disabled = true;
                pinContainer.style.display = 'block'; 
            } else {
                if(phoneInput.value === "The Boss Account") phoneInput.value = "";
                phoneInput.disabled = false;
                pinContainer.style.display = 'none';
            }
        }

        function authenticateUser() {
            const email = document.getElementById('userEmail').value;
            const pin = document.getElementById('masterPin').value;

            if(email === MASTER_EMAIL) {
                if(pin === MASTER_PIN) {
                    alert("Authentication Success! Welcome, Master Lupin.");
                    loadFakeChats();
                    switchPage('admin-panel');
                } else {
                    alert("ACCESS DENIED: Invalid Master PIN.");
                }
            } else if (email !== "") {
                alert("Login successful. Welcome to ThinkApp Web Test.");
                loadFakeChats();
                switchPage('main-app');
            } else {
                alert("Please enter a valid email.");
            }
        }

        /* ==========================================
         * 💬 4. LOAD CHATS UI
         * ========================================== */
        function loadFakeChats() {
            const chatContainer = document.getElementById('chatListContainer');
            const fakeData = [
                { name: "~LupperAI", msg: "I am active. Type .ai [swali] or .call", time: "Now", tick: "fa-check-double", verified: true, bot: true },
                { name: "Rafiki", msg: "Test version inaonekana vizuri 🔥", time: "10:45 AM", tick: "fa-check-double", verified: false, bot: false }
            ];

            let html = "";
            fakeData.forEach(chat => {
                const badge = chat.verified ? `<i class="fa-solid fa-circle-check blue-tick"></i>` : '';
                html += `
                <div class="chat-item" onclick="triggerBotLogic('${chat.name}', ${chat.bot})">
                    <div class="avatar"><i class="fa-solid ${chat.bot ? 'fa-robot' : 'fa-user'}"></i></div>
                    <div class="chat-details">
                        <div class="chat-name">${chat.name} ${badge} <span style="font-size:12px; font-weight:normal; color:#8696A0;">${chat.time}</span></div>
                        <div class="chat-last-msg"><i class="fa-solid ${chat.tick}" style="color: #53bdeb; margin-right: 5px;"></i>${chat.msg}</div>
                    </div>
                </div>`;
            });
            chatContainer.innerHTML = html;
        }

        /* ==========================================
         * 🤖 5. REAL LUILEYS AI & CALL ENGINE
         * ========================================== */
        async function fetchGemini(promptText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "Network Error: Imeshindwa kuwasiliana na Google Gemini.";
            }
        }

        function startRealCall() {
            const roomID = "ThinkApp_" + Math.floor(Math.random() * 10000);
            const kitToken = ZegoUIKitPrebuilt.generateKitTokenForTest(ZEGO_API.appID, ZEGO_API.serverSecret, roomID, "User_"+Date.now(), "ThinkApp User");
            
            const zp = ZegoUIKitPrebuilt.create(kitToken);
            zp.joinRoom({
                container: document.querySelector("#main-app"),
                scenario: { mode: ZegoUIKitPrebuilt.OneONoneCall },
                showPreJoinView: false
            });
        }

        async function triggerBotLogic(chatName, isBot) {
            if(isBot) {
                const command = prompt("Weka Command yako kitalamu (.tt, .yt, .ai [swali], .call):");
                if(!command) return;

                if(command.startsWith(".tt") || command.startsWith(".yt")) {
                    alert("⚠️ ALARM YAKO: Kipengele hiki cha kudownload TikTok/YouTube bado hakijawekwa kwenye toleo hili la majaribio. Subiri V2.0!");
                }
                else if(command.startsWith(".ai ")) {
                    const question = command.replace(".ai ", "");
                    alert("🧠 LupperAI inatafuta majibu...");
                    const answer = await fetchGemini(question);
                    alert("LupperAI Inasema:\n\n" + answer);
                }
                else if(command === ".call") {
                    startRealCall();
                }
                else {
                    alert("Command haitambuliki. Tumia .ai au .call kwa sasa.");
                }
            } else {
                const callAction = confirm(`Je, unataka kuanzisha Video Call na ${chatName}?`);
                if(callAction) startRealCall();
            }
        }
    </script>
</body>
</html>
