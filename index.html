<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThinkApp - Lupper Edition V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-bg: #0B141A; --wa-header: #128C7E; --wa-chat-bg: #0d1b1e; --wa-msg-in: #202C33; --wa-msg-out: #005C4B; --wa-teal: #00A884; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--wa-bg); color: #E9EDEF; overflow: hidden; }
        .hidden { display: none !important; }

        /* AUTH SCREEN */
        #auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(180deg, #0B141A 0%, #128C7E 100%); padding: 20px; }
        .auth-box { background: #111B21; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--wa-teal); background: #2A3942; color: white; outline: none; }
        .auth-btn { background: var(--wa-teal); color: white; border: none; padding: 12px; width: 100%; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* MAIN UI */
        .top-bar { background: var(--wa-header); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; background: var(--wa-header); text-align: center; font-weight: bold; font-size: 14px; }
        .tab { flex: 1; padding: 12px; color: #B1D9D4; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom: 3px solid white; }

        /* LISTS */
        .content-area { height: calc(100vh - 105px); overflow-y: auto; }
        .item { display: flex; padding: 15px; border-bottom: 1px solid #202C33; align-items: center; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #666; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 20px; }
        .details { flex: 1; }
        .name { font-weight: bold; display: flex; justify-content: space-between; }
        .last-msg { color: #8696A0; font-size: 14px; margin-top: 3px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* CHAT WINDOW */
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--wa-chat-bg); z-index: 200; display: flex; flex-direction: column; }
        .chat-header { background: var(--wa-header); padding: 10px; display: flex; align-items: center; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-repeat: repeat; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; font-size: 15px; line-height: 1.4; }
        .msg.in { background: var(--wa-msg-in); align-self: flex-start; }
        .msg.out { background: var(--wa-msg-out); align-self: flex-end; }
        
        .input-area { background: #202C33; padding: 10px; display: flex; align-items: center; }
        .input-area input { flex: 1; background: #2A3942; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        .send-btn { margin-left: 10px; color: var(--wa-teal); font-size: 22px; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color: var(--wa-teal)">ThinkApp Login</h2>
            <input type="email" id="loginEmail" class="auth-input" placeholder="Weka Email yako">
            <input type="password" id="loginPin" class="auth-input" placeholder="Weka PIN yako (2892)">
            <button class="auth-btn" onclick="checkAuth()">Fungua ThinkApp</button>
        </div>
    </div>

    <div id="app-home" class="hidden">
        <div class="top-bar">
            <h2 style="margin:0">ThinkApp</h2>
            <div><i class="fa fa-search" style="margin-right:20px"></i><i class="fa fa-ellipsis-v"></i></div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="showTab('chats')">CHATS</div>
            <div class="tab" onclick="showTab('status')">STATUS</div>
            <div class="tab" onclick="showTab('calls')">CALLS</div>
        </div>

        <div id="chats-list" class="content-area">
            <div class="item" onclick="openChat('~LupperAI')">
                <div class="avatar" style="background:#00A884"><i class="fa fa-robot"></i></div>
                <div class="details">
                    <div class="name">~LupperAI <span style="font-size:12px;color:#8696A0">Sasa hivi</span></div>
                    <div class="last-msg">Nipo tayari, nimalize kabisa Lupin!</div>
                </div>
            </div>
            <div class="item" onclick="openChat('Rafiki')">
                <div class="avatar"><i class="fa fa-user"></i></div>
                <div class="details">
                    <div class="name">Rafiki <span style="font-size:12px;color:#8696A0">10:45 AM</span></div>
                    <div class="last-msg">Vipi man, hiyo ThinkApp imeisha?</div>
                </div>
            </div>
        </div>
        <div id="status-list" class="content-area hidden" style="padding:20px; text-align:center; color:#8696A0">Hakuna Status mpya kwa sasa.</div>
        <div id="calls-list" class="content-area hidden" style="padding:20px; text-align:center; color:#8696A0">Hakuna simu zilizopigwa.</div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="chat-header">
            <i class="fa fa-arrow-left" onclick="closeChat()" style="margin-right:15px; cursor:pointer"></i>
            <div class="avatar" style="width:35px; height:35px; margin-right:10px; font-size:15px"><i class="fa fa-robot" id="chat-icon"></i></div>
            <div style="flex:1">
                <div id="chat-target-name" style="font-weight:bold">~LupperAI</div>
                <div style="font-size:12px; color:#B1D9D4">online</div>
            </div>
            <i class="fa fa-video" style="margin-right:20px"></i>
            <i class="fa fa-phone"></i>
        </div>
        <div class="chat-messages" id="message-container"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Andika meseji hapa...">
            <button class="send-btn" onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const MASTER_EMAIL = "lupinstarnley006@gmail.com";
        const MASTER_PIN = "2892";
        const GEMINI_KEY = "AIzaSyAd1HLXbZxdc2EIGuUGN4NhPY16r7bb7z4"; 

        function checkAuth() {
            const email = document.getElementById('loginEmail').value;
            const pin = document.getElementById('loginPin').value;
            if(email === MASTER_EMAIL && pin === MASTER_PIN) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-home').classList.remove('hidden');
            } else {
                alert("Wewe sio Boss! Jaribu tena.");
            }
        }

        function showTab(name) {
            document.querySelectorAll('.content-area').forEach(c => c.classList.add('hidden'));
            document.getElementById(name + '-list').classList.remove('hidden');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function openChat(name) {
            document.getElementById('chat-target-name').innerText = name;
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('message-container').innerHTML = `<div class="msg in">Habari! Mimi ni ${name}, nitumie meseji yoyote hapa chini.</div>`;
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const container = document.getElementById('message-container');
            const text = input.value.trim();
            if(!text) return;

            // My Message
            appendMsg(text, 'out');
            input.value = "";

            // Kama ni AI
            if(document.getElementById('chat-target-name').innerText === '~LupperAI') {
                const aiBubble = appendMsg("Inafikiri...", 'in');
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                    });
                    const data = await response.json();
                    if(data.candidates) {
                        aiBubble.innerText = data.candidates[0].content.parts[0].text;
                    } else {
                        aiBubble.innerText = "Error: Google API Key imefungiwa au imezidi kiwango.";
                    }
                } catch (e) {
                    aiBubble.innerText = "Shida ya Mtandao! Angalia MB zako au jaribu baadaye.";
                }
            } else {
                setTimeout(() => appendMsg("Sawa, nimekupata!", 'in'), 1000);
            }
        }

        function appendMsg(text, type) {
            const container = document.getElementById('message-container');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
